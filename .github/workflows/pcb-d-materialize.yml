name: Materialize PCB-D KiCad symbols

on:
  push:
    branches:
      - agent/pcb-d-lm5143design-calc-v1-9
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/pcb-d-lm5143design-calc-v1-9' || github.ref_name == 'agent/pcb-d-lm5143design-calc-v1-9'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/pcb-d-lm5143design-calc-v1-9

      - name: Reconstruct deterministic generator
        shell: bash
        run: |
          set -u
          cat Tools/kicad/.materialize/generator.b64.* | base64 --decode > Tools/kicad/generate_pcb_d_converter_core.py
          chmod +x Tools/kicad/generate_pcb_d_converter_core.py
          set +e
          python -m py_compile Tools/kicad/generate_pcb_d_converter_core.py > /tmp/materialize.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python Tools/kicad/generate_pcb_d_converter_core.py >> /tmp/materialize.log 2>&1
            status=$?
          fi
          set -e
          cat /tmp/materialize.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/materialize.log Hardware/KiCad/PCB_D_MATERIALIZE_FAILURE.txt
            echo "materialization failed with status $status" >> Hardware/KiCad/PCB_D_MATERIALIZE_FAILURE.txt
          else
            rm -f Hardware/KiCad/PCB_D_MATERIALIZE_FAILURE.txt
            rm -rf Tools/kicad/.materialize
            rm .github/workflows/pcb-d-materialize.yml
          fi

      - name: Commit materialization result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "hardware: materialize PCB-D KiCad symbol gate"
          git push origin HEAD:agent/pcb-d-lm5143design-calc-v1-9
