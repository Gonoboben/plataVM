name: Materialize PCB-D KiCad geometry fix

on:
  push:
    branches:
      - agent/pcb-d-lm5143design-calc-v1-9
    paths:
      - ".github/workflows/pcb-d-geometry-fix-materialize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pcb-d-geometry-fix-materialize
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/pcb-d-lm5143design-calc-v1-9
          fetch-depth: 0

      - name: Apply coordinate transform patch and regenerate
        shell: bash
        run: |
          set -euo pipefail
          python Tools/kicad/patch_pcb_d_symbol_coordinates.py
          python -m py_compile \
            Tools/kicad/generate_pcb_d_converter_core.py \
            Tools/erc/pcb_d_kicad_symbol_gate.py
          python Tools/kicad/generate_pcb_d_converter_core.py
          python Tools/erc/pcb_d_converter_core_erc.py \
            Hardware/KiCad/PCB_D_CONVERTER_CORE_MANIFEST_V1_9.json
          python Tools/erc/pcb_d_lm5143_pinmap_erc.py \
            Hardware/KiCad/LM5143A_Q1_RHA40_PINMAP_V1_9.json
          python Tools/erc/pcb_d_kicad_symbol_gate.py \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            Hardware/KiCad/plataVM_symbols.kicad_sym

          generated="$RUNNER_TEMP/pcb-d-generated"
          rm -rf "$generated"
          python Tools/kicad/generate_pcb_d_converter_core.py --output-dir "$generated"
          diff -u Hardware/KiCad/41_5V_DC_DC.kicad_sch "$generated/41_5V_DC_DC.kicad_sch"
          diff -u Hardware/KiCad/plataVM_symbols.kicad_sym "$generated/plataVM_symbols.kicad_sym"

      - name: Install official KiCad 10
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends kicad
          kicad-cli version

      - name: Run native ERC and reject residual geometry faults
        shell: bash
        run: |
          set -u
          mkdir -p artifacts
          set +e
          kicad-cli sch erc \
            --format json \
            --output artifacts/PCB_D_NATIVE_ERC_AFTER_GEOMETRY.json \
            --severity-error \
            --exit-code-violations \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            > artifacts/native-erc.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > artifacts/native-erc-exit-code.txt
          kicad-cli version > artifacts/kicad-version.txt
          cat artifacts/native-erc.log

          python - <<'PY'
          import json
          from pathlib import Path

          report = Path('artifacts/PCB_D_NATIVE_ERC_AFTER_GEOMETRY.json')
          data = json.loads(report.read_text(encoding='utf-8'))
          violations = [
              violation
              for sheet in data.get('sheets', [])
              for violation in sheet.get('violations', [])
          ]

          residual_geometry = []
          for violation in violations:
              vtype = violation.get('type', '')
              description = violation.get('description', '')
              items = violation.get('items', [])
              item_text = ' '.join(str(item) for item in items)
              critical = (
                  vtype == 'pin_to_pin'
                  or 'U_DCDC pin 19' in item_text
                  or 'U_DCDC pin 32' in item_text
                  or ('U_DCDC' in item_text and 'EXPOSED_PAD' in item_text)
                  or 'TP_PG2' in item_text
                  or 'TP_SYNC' in item_text
                  or '#FLG' in item_text
                  or 'LOL1' in description and 'RES' in description
              )
              if critical:
                  residual_geometry.append(violation)

          summary = {
              'baseline_native_errors_before_geometry_fix': 29,
              'total_native_errors_after_geometry_fix': len(violations),
              'residual_geometry_faults': len(residual_geometry),
              'residual_geometry': residual_geometry,
              'all_remaining_violations': violations,
          }
          Path('artifacts/native-erc-summary.json').write_text(
              json.dumps(summary, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          if residual_geometry:
              raise SystemExit('critical symbol-coordinate faults remain')
          if len(violations) >= 29:
              raise SystemExit('native ERC error count did not improve')
          PY

      - name: Upload geometry-fix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-d-kicad-geometry-fix-evidence
          path: artifacts/
          if-no-files-found: error

      - name: Commit verified geometry fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/pcb-d-geometry-fix-materialize.yml
          rm Tools/kicad/patch_pcb_d_symbol_coordinates.py
          rm -rf Tools/kicad/__pycache__ Tools/erc/__pycache__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "hardware: fix PCB-D KiCad symbol coordinate transform V1.9"
          git push origin HEAD:agent/pcb-d-lm5143design-calc-v1-9
