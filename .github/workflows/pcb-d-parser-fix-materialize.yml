name: Materialize PCB-D KiCad parser fix

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/pcb-d-parser-fix-materialize.yml"
      - "Tools/kicad/.parser_fix_v2/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pcb-d-parser-fix-materialize-v2
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/pcb-d-lm5143design-calc-v1-9'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact working branch
        uses: actions/checkout@v4
        with:
          ref: agent/pcb-d-lm5143design-calc-v1-9
          fetch-depth: 0

      - name: Reconstruct parser-fix v2 diagnostics
        shell: bash
        run: |
          set -u
          mkdir -p artifacts
          archive=/tmp/pcb_d_parser_fix_v2.tar.gz

          sha256sum Tools/kicad/.parser_fix_v2/archive.b64.* \
            > artifacts/parser_fix_v2_chunks.sha256
          wc -c Tools/kicad/.parser_fix_v2/archive.b64.* \
            > artifacts/parser_fix_v2_chunks.sizes

          set +e
          cat Tools/kicad/.parser_fix_v2/archive.b64.* \
            | base64 --decode > "$archive" \
            2> artifacts/parser_fix_v2_base64.stderr
          decode_status=$?
          sha256sum "$archive" > artifacts/parser_fix_v2_archive.sha256
          wc -c "$archive" > artifacts/parser_fix_v2_archive.size
          gzip -t "$archive" > artifacts/parser_fix_v2_gzip.log 2>&1
          gzip_status=$?
          tar -tzf "$archive" > artifacts/parser_fix_v2_members.log 2>&1
          tar_status=$?
          set -e

          printf 'base64_decode=%s\ngzip_test=%s\ntar_list=%s\n' \
            "$decode_status" "$gzip_status" "$tar_status" \
            > artifacts/parser_fix_v2_exit_codes.txt
          cat artifacts/parser_fix_v2_exit_codes.txt
          cat artifacts/parser_fix_v2_archive.sha256
          cat artifacts/parser_fix_v2_members.log

      - name: Upload reconstruction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-d-parser-fix-v2-diagnostics
          path: artifacts/
          if-no-files-found: error

      - name: Enforce deterministic parser-fix archive
        shell: bash
        run: |
          set -euo pipefail
          grep -qx 'base64_decode=0' artifacts/parser_fix_v2_exit_codes.txt
          grep -qx 'gzip_test=0' artifacts/parser_fix_v2_exit_codes.txt
          grep -qx 'tar_list=0' artifacts/parser_fix_v2_exit_codes.txt
          echo "23839cd1121c02aa24009e9c2ea18b8e325a6d79c0eeb262b62d3fbfdf52b8ed  /tmp/pcb_d_parser_fix_v2.tar.gz" \
            | sha256sum --check

      - name: Extract verified allowlisted files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import tarfile

          archive = Path('/tmp/pcb_d_parser_fix_v2.tar.gz')
          allowed = {
              'Hardware/KiCad/41_5V_DC_DC.kicad_sch',
              'Hardware/KiCad/plataVM_symbols.kicad_sym',
              'Tools/kicad/generate_pcb_d_converter_core.py',
              'Tools/erc/pcb_d_kicad_symbol_gate.py',
          }

          with tarfile.open(archive, 'r:gz') as tf:
              members = tf.getmembers()
              names = [m.name.removeprefix('./') for m in members]
              if len(names) != len(set(names)):
                  raise SystemExit('duplicate archive member detected')
              if set(names) != allowed:
                  raise SystemExit(f'unexpected archive members: {sorted(set(names) ^ allowed)}')
              for member in members:
                  name = member.name.removeprefix('./')
                  path = Path(name)
                  if not member.isfile():
                      raise SystemExit(f'non-regular archive member rejected: {name}')
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe archive path rejected: {name}')
              tf.extractall('.', filter='data')

          print('parser-fix v2 archive allowlist: PASS')
          PY

      - name: Validate regenerated KiCad sources
        shell: bash
        run: |
          set -u
          generated="$RUNNER_TEMP/pcb-d-generated"
          rm -rf "$generated"
          mkdir -p "$generated" artifacts

          set +e
          python -m py_compile \
            Tools/kicad/generate_pcb_d_converter_core.py \
            Tools/erc/pcb_d_kicad_symbol_gate.py \
            > artifacts/parser_fix_v2_py_compile.log 2>&1
          compile_status=$?

          python Tools/erc/pcb_d_kicad_symbol_gate.py \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            Hardware/KiCad/plataVM_symbols.kicad_sym \
            > artifacts/parser_fix_v2_symbol_gate.log 2>&1
          symbol_status=$?

          python Tools/kicad/generate_pcb_d_converter_core.py \
            --output-dir "$generated" \
            > artifacts/parser_fix_v2_generation.log 2>&1
          generation_status=$?

          diff -u Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            "$generated/41_5V_DC_DC.kicad_sch" \
            > artifacts/parser_fix_v2_schematic.diff 2>&1
          schematic_diff_status=$?

          diff -u Hardware/KiCad/plataVM_symbols.kicad_sym \
            "$generated/plataVM_symbols.kicad_sym" \
            > artifacts/parser_fix_v2_symbol_library.diff 2>&1
          symbol_diff_status=$?

          python - <<'PY' \
            > artifacts/parser_fix_v2_hygiene.log 2>&1
          from pathlib import Path

          for name in (
              'Hardware/KiCad/41_5V_DC_DC.kicad_sch',
              'Hardware/KiCad/plataVM_symbols.kicad_sym',
          ):
              data = Path(name).read_bytes()
              if b'\x00' in data:
                  raise SystemExit(f'{name}: NUL byte detected')
              text = data.decode('utf-8')
              if r'\t' in text or r'\n' in text:
                  raise SystemExit(f'{name}: escaped parser-control sequence detected')
          print('KiCad parser hygiene: PASS')
          PY
          hygiene_status=$?

          grep -q '(version 20260101)' Hardware/KiCad/41_5V_DC_DC.kicad_sch
          version_status=$?
          grep -q '(generator_version "10.0")' Hardware/KiCad/41_5V_DC_DC.kicad_sch
          generator_version_status=$?
          set -e

          printf 'py_compile=%s\nsymbol_gate=%s\ngeneration=%s\nschematic_diff=%s\nsymbol_library_diff=%s\nhygiene=%s\nversion=%s\ngenerator_version=%s\n' \
            "$compile_status" "$symbol_status" "$generation_status" \
            "$schematic_diff_status" "$symbol_diff_status" "$hygiene_status" \
            "$version_status" "$generator_version_status" \
            > artifacts/parser_fix_v2_validation_exit_codes.txt

          cat artifacts/parser_fix_v2_validation_exit_codes.txt
          cat artifacts/parser_fix_v2_py_compile.log
          cat artifacts/parser_fix_v2_symbol_gate.log
          cat artifacts/parser_fix_v2_generation.log
          cat artifacts/parser_fix_v2_schematic.diff
          cat artifacts/parser_fix_v2_symbol_library.diff
          cat artifacts/parser_fix_v2_hygiene.log

          test "$compile_status" -eq 0
          test "$symbol_status" -eq 0
          test "$generation_status" -eq 0
          test "$schematic_diff_status" -eq 0
          test "$symbol_diff_status" -eq 0
          test "$hygiene_status" -eq 0
          test "$version_status" -eq 0
          test "$generator_version_status" -eq 0

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-d-parser-fix-v2-verification
          path: artifacts/
          if-no-files-found: error

      - name: Remove all one-shot materialization inputs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Tools/kicad/.parser_fix Tools/kicad/.parser_fix_v2
          rm .github/workflows/pcb-d-parser-fix-materialize.yml
          rm -rf Tools/kicad/__pycache__ Tools/erc/__pycache__

      - name: Commit verified KiCad 10 parser fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "hardware: fix PCB-D KiCad parser format V1.9"
          git push origin HEAD:agent/pcb-d-lm5143design-calc-v1-9
