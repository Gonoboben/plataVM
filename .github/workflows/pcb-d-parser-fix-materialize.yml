name: Materialize PCB-D KiCad parser fix

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/pcb-d-parser-fix-materialize.yml"
      - "Tools/kicad/.parser_fix_v2/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pcb-d-parser-fix-materialize-v2
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/pcb-d-lm5143design-calc-v1-9'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact working branch
        uses: actions/checkout@v4
        with:
          ref: agent/pcb-d-lm5143design-calc-v1-9
          fetch-depth: 0

      - name: Reconstruct verified parser-fix archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          archive="$RUNNER_TEMP/pcb_d_parser_fix_v2.tar.gz"
          cat Tools/kicad/.parser_fix_v2/archive.b64.* | base64 --decode > "$archive"
          echo "23839cd1121c02aa24009e9c2ea18b8e325a6d79c0eeb262b62d3fbfdf52b8ed  $archive" | sha256sum --check
          gzip -t "$archive"
          sha256sum "$archive" > artifacts/parser_fix_v2_archive.sha256
          tar -tzf "$archive" > artifacts/parser_fix_v2_members.log

          python - <<'PY'
          from pathlib import Path
          import tarfile

          archive = Path('/home/runner/work/_temp/pcb_d_parser_fix_v2.tar.gz')
          allowed = {
              'Hardware/KiCad/41_5V_DC_DC.kicad_sch',
              'Hardware/KiCad/plataVM_symbols.kicad_sym',
              'Tools/kicad/generate_pcb_d_converter_core.py',
              'Tools/erc/pcb_d_kicad_symbol_gate.py',
          }

          with tarfile.open(archive, 'r:gz') as tf:
              members = tf.getmembers()
              names = [m.name.removeprefix('./') for m in members]
              if len(names) != len(set(names)):
                  raise SystemExit('duplicate archive member detected')
              if set(names) != allowed:
                  raise SystemExit(f'unexpected archive members: {sorted(set(names) ^ allowed)}')
              for member in members:
                  name = member.name.removeprefix('./')
                  path = Path(name)
                  if not member.isfile():
                      raise SystemExit(f'non-regular archive member rejected: {name}')
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe archive path rejected: {name}')
              tf.extractall('.', filter='data')

          print('parser-fix v2 archive allowlist: PASS')
          PY

      - name: Validate exact symbols and deterministic generation
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            Tools/kicad/generate_pcb_d_converter_core.py \
            Tools/erc/pcb_d_kicad_symbol_gate.py
          python Tools/erc/pcb_d_kicad_symbol_gate.py \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            Hardware/KiCad/plataVM_symbols.kicad_sym \
            | tee artifacts/parser_fix_v2_symbol_gate.log

          generated="$RUNNER_TEMP/pcb-d-generated"
          rm -rf "$generated"
          python Tools/kicad/generate_pcb_d_converter_core.py \
            --output-dir "$generated" \
            | tee artifacts/parser_fix_v2_generation.log
          diff -u Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            "$generated/41_5V_DC_DC.kicad_sch"
          diff -u Hardware/KiCad/plataVM_symbols.kicad_sym \
            "$generated/plataVM_symbols.kicad_sym"

          python - <<'PY'
          from pathlib import Path

          for name in (
              'Hardware/KiCad/41_5V_DC_DC.kicad_sch',
              'Hardware/KiCad/plataVM_symbols.kicad_sym',
          ):
              data = Path(name).read_bytes()
              if b'\x00' in data:
                  raise SystemExit(f'{name}: NUL byte detected')
              text = data.decode('utf-8')
              if r'\t' in text or r'\n' in text:
                  raise SystemExit(f'{name}: escaped parser-control sequence detected')
          print('KiCad parser hygiene: PASS')
          PY

          grep -q '(version 20260101)' Hardware/KiCad/41_5V_DC_DC.kicad_sch
          grep -q '(generator "plataVM_symbol_gate")' Hardware/KiCad/41_5V_DC_DC.kicad_sch
          grep -q '(generator_version "1.0")' Hardware/KiCad/41_5V_DC_DC.kicad_sch

      - name: Upload materialization evidence
        uses: actions/upload-artifact@v4
        with:
          name: pcb-d-parser-fix-v2-verification
          path: artifacts/
          if-no-files-found: error

      - name: Remove one-shot materialization inputs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Tools/kicad/.parser_fix Tools/kicad/.parser_fix_v2
          rm .github/workflows/pcb-d-parser-fix-materialize.yml
          rm -rf Tools/kicad/__pycache__ Tools/erc/__pycache__

      - name: Commit verified KiCad 10 parser fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "hardware: fix PCB-D KiCad parser format V1.9"
          git push origin HEAD:agent/pcb-d-lm5143design-calc-v1-9
