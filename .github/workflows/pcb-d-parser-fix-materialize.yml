name: Materialize PCB-D KiCad parser fix

on:
  push:
    branches:
      - agent/pcb-d-lm5143design-calc-v1-9
    paths:
      - ".github/workflows/pcb-d-parser-fix-materialize.yml"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pcb-d-parser-fix-materialize
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/pcb-d-lm5143design-calc-v1-9'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact working branch
        uses: actions/checkout@v4
        with:
          ref: agent/pcb-d-lm5143design-calc-v1-9
          fetch-depth: 0

      - name: Reconstruct and verify parser-fix archive
        shell: bash
        run: |
          set -u
          mkdir -p artifacts
          sha256sum Tools/kicad/.parser_fix/parser_fix.b64.* > artifacts/parser_fix_chunks.sha256
          wc -c Tools/kicad/.parser_fix/parser_fix.b64.* > artifacts/parser_fix_chunks.sizes

          set +e
          cat Tools/kicad/.parser_fix/parser_fix.b64.* | base64 --decode > /tmp/pcb_d_parser_fix.tar.gz 2> artifacts/base64_decode.stderr
          decode_status=$?
          cp /tmp/pcb_d_parser_fix.tar.gz artifacts/pcb_d_parser_fix_assembled.tar.gz
          sha256sum /tmp/pcb_d_parser_fix.tar.gz > artifacts/parser_fix_archive.sha256
          gzip -t /tmp/pcb_d_parser_fix.tar.gz > artifacts/gzip_test.log 2>&1
          gzip_status=$?
          tar -tzf /tmp/pcb_d_parser_fix.tar.gz > artifacts/tar_members.log 2>&1
          tar_status=$?
          printf 'base64_decode=%s\ngzip_test=%s\ntar_list=%s\n' "$decode_status" "$gzip_status" "$tar_status" > artifacts/parser_fix_exit_codes.txt
          cat artifacts/parser_fix_exit_codes.txt
          cat artifacts/parser_fix_archive.sha256
          cat artifacts/tar_members.log
          set -e

          test "$decode_status" -eq 0
          test "$gzip_status" -eq 0
          test "$tar_status" -eq 0

          python - <<'PY'
          from pathlib import Path
          import tarfile

          archive = Path('/tmp/pcb_d_parser_fix.tar.gz')
          allowed = {
              'Hardware/KiCad/41_5V_DC_DC.kicad_sch',
              'Hardware/KiCad/plataVM_symbols.kicad_sym',
              'Tools/kicad/generate_pcb_d_converter_core.py',
              'Tools/erc/pcb_d_kicad_symbol_gate.py',
          }

          with tarfile.open(archive, 'r:gz') as tf:
              members = tf.getmembers()
              names = [m.name.removeprefix('./') for m in members]
              if len(names) != len(set(names)):
                  raise SystemExit('duplicate archive member detected')
              if set(names) != allowed:
                  raise SystemExit(f'unexpected archive members: {sorted(set(names) ^ allowed)}')
              for member in members:
                  name = member.name.removeprefix('./')
                  path = Path(name)
                  if not member.isfile():
                      raise SystemExit(f'non-regular archive member rejected: {name}')
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe archive path rejected: {name}')
              tf.extractall('.', filter='data')

          print('parser-fix archive allowlist: PASS')
          PY

      - name: Upload parser-fix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-d-parser-fix-diagnostics
          path: artifacts/
          if-no-files-found: error

      - name: Validate regenerated KiCad sources
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            Tools/kicad/generate_pcb_d_converter_core.py \
            Tools/erc/pcb_d_kicad_symbol_gate.py
          python Tools/erc/pcb_d_kicad_symbol_gate.py \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            Hardware/KiCad/plataVM_symbols.kicad_sym
          rm -rf "$RUNNER_TEMP/pcb-d-generated"
          python Tools/kicad/generate_pcb_d_converter_core.py \
            --output-dir "$RUNNER_TEMP/pcb-d-generated"
          diff -u Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            "$RUNNER_TEMP/pcb-d-generated/41_5V_DC_DC.kicad_sch"
          diff -u Hardware/KiCad/plataVM_symbols.kicad_sym \
            "$RUNNER_TEMP/pcb-d-generated/plataVM_symbols.kicad_sym"
          test "$(grep -c '\\t\|\\n' Hardware/KiCad/41_5V_DC_DC.kicad_sch || true)" -eq 0
          grep -q '(version 20260101)' Hardware/KiCad/41_5V_DC_DC.kicad_sch

      - name: Remove one-shot materialization inputs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Tools/kicad/.parser_fix
          rm .github/workflows/pcb-d-parser-fix-materialize.yml
          rm -rf Tools/kicad/__pycache__ Tools/erc/__pycache__

      - name: Commit verified parser fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "hardware: fix PCB-D KiCad parser format V1.9"
          git push origin HEAD:agent/pcb-d-lm5143design-calc-v1-9
