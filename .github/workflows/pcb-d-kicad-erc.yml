name: PCB-D KiCad 10 ERC

on:
  pull_request:
    paths:
      - "Hardware/KiCad/41_5V_DC_DC.kicad_sch"
      - "Hardware/KiCad/plataVM_symbols.kicad_sym"
      - "Hardware/KiCad/PCB_D_CONVERTER_CORE_MANIFEST_V1_9.json"
      - "Tools/kicad/generate_pcb_d_converter_core.py"
      - "Tools/erc/pcb_d_kicad_symbol_gate.py"
      - "Tools/erc/pcb_d_converter_core_erc.py"
      - ".github/workflows/pcb-d-kicad-erc.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-symbol-and-native-erc:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deterministic semantic and symbol Gates
        run: |
          python Tools/erc/pcb_d_converter_core_erc.py \
            Hardware/KiCad/PCB_D_CONVERTER_CORE_MANIFEST_V1_9.json
          python Tools/erc/pcb_d_lm5143_pinmap_erc.py \
            Hardware/KiCad/LM5143A_Q1_RHA40_PINMAP_V1_9.json
          python Tools/erc/pcb_d_kicad_symbol_gate.py \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            Hardware/KiCad/plataVM_symbols.kicad_sym

      - name: Verify canonical KiCad source hygiene
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            Tools/kicad/generate_pcb_d_converter_core.py \
            Tools/erc/pcb_d_kicad_symbol_gate.py
          python - <<'PY'
          from pathlib import Path

          files = [
              Path('Hardware/KiCad/41_5V_DC_DC.kicad_sch'),
              Path('Hardware/KiCad/plataVM_symbols.kicad_sym'),
          ]
          for path in files:
              data = path.read_bytes()
              if b'\x00' in data:
                  raise SystemExit(f'{path}: NUL byte detected')
              text = data.decode('utf-8')
              if r'\t' in text or r'\n' in text:
                  raise SystemExit(f'{path}: escaped parser-control sequence detected')
          if '(version 20260101)' not in files[0].read_text(encoding='utf-8'):
              raise SystemExit('schematic is not normalized to the accepted KiCad 10 source version')
          if '(version 20241209)' not in files[1].read_text(encoding='utf-8'):
              raise SystemExit('symbol library version mismatch')
          print('canonical KiCad source hygiene: PASS')
          print('NOTE: generator byte-parity remains OPEN and is not falsely claimed.')
          PY

      - name: Install official KiCad 10 release package
        run: |
          sudo apt-get update
          sudo apt-get install --yes software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends kicad
          kicad-cli version

      - name: Native KiCad ERC — capture result
        run: |
          mkdir -p artifacts
          set +e
          kicad-cli sch erc \
            --format json \
            --output artifacts/PCB_D_41_5V_DC_DC_NATIVE_ERC.json \
            --severity-error \
            --exit-code-violations \
            Hardware/KiCad/41_5V_DC_DC.kicad_sch \
            > artifacts/native-erc-command.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > artifacts/native-erc-exit-code.txt
          cat artifacts/native-erc-command.log
          echo "native ERC exit code: $status"

      - name: Upload native ERC diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-d-kicad-native-erc
          path: artifacts/
          if-no-files-found: error

      - name: Enforce native ERC result
        run: |
          test "$(cat artifacts/native-erc-exit-code.txt)" -eq 0
